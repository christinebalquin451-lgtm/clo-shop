<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Flow Shop — Fashion App | Real Images Ready</title>
  <!-- Font Awesome Icons (v6 free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f4f7fc 0%, #eef2f8 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .phone-mock {
      max-width: 400px;
      width: 100%;
      background: #ffffff;
      border-radius: 48px;
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.35), 0 0 0 8px #e2e8f0;
      overflow: hidden;
      height: 780px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .status-bar {
      background: white;
      padding: 12px 22px 6px 22px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      border-bottom: 1px solid #f1f5f9;
    }

    .app-header {
      padding: 8px 20px 4px 20px;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #c084fc, #ec4899, #f43f5e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .logo p {
      font-size: 9px;
      color: #6c727f;
      font-weight: 500;
    }

    .header-icons {
      display: flex;
      gap: 8px;
    }
    .header-icons i {
      font-size: 22px;
      color: #334155;
      cursor: pointer;
      transition: transform 0.1s;
      padding: 6px;
    }
    .heart-badge {
      position: relative;
    }
    .heart-count-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: #ec4899;
      color: white;
      border-radius: 30px;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      min-width: 18px;
      text-align: center;
    }

    .search-section {
      padding: 12px 20px 8px;
    }
    .search-box {
      background: #f1f5f9;
      border-radius: 36px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid transparent;
    }
    .search-box:focus-within {
      border-color: #ec4899;
      background: white;
      box-shadow: 0 2px 12px rgba(236, 72, 153, 0.12);
    }
    .search-box input {
      background: transparent;
      border: none;
      flex: 1;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      outline: none;
      font-weight: 500;
    }
    .search-box input::placeholder {
      color: #94a3b8;
    }

    .categories {
      padding: 12px 20px 4px;
    }
    .section-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 12px;
      color: #0f172a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cat-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 6px;
    }
    .cat-item {
      background: #f1f5f9;
      padding: 8px 18px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      color: #1e293b;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-item i {
      margin-right: 8px;
    }
    .cat-item.active {
      background: #0f172a;
      color: white;
    }
    .filter-group {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .filter-select {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 20px 16px;
      scroll-behavior: smooth;
    }
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }
    .product-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid #f0f2f5;
      position: relative;
      transition: transform 0.2s;
    }
    .product-card:active {
      transform: scale(0.98);
    }
    .heart-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      font-size: 18px;
      transition: all 0.15s;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }
    .heart-btn i {
      color: #94a3b8;
      transition: 0.1s;
    }
    .heart-btn.liked i {
      color: #ec4899;
    }
    .heart-btn:active i {
      transform: scale(1.2);
    }
    .product-img {
      background: #faf5ff;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    .product-card:hover .product-img img {
      transform: scale(1.03);
    }
    .product-info {
      padding: 12px 12px 14px;
    }
    .product-title {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-price {
      font-weight: 800;
      color: #ec4899;
      font-size: 16px;
      margin: 6px 0;
    }
    .product-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #5b677b;
      margin-bottom: 10px;
    }
    .btn-add {
      background: #0f172a;
      border: none;
      padding: 9px 0;
      width: 100%;
      border-radius: 40px;
      color: white;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn-add:active {
      transform: scale(0.95);
      background: #ec4899;
    }

    /* Profile Panel */
    .profile-overlay {
      position: fixed;
      top: 0;
      right: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      display: none;
      justify-content: flex-end;
      backdrop-filter: blur(3px);
    }
    .profile-panel {
      width: 85%;
      max-width: 340px;
      background: white;
      height: 100%;
      padding: 30px 24px;
      box-shadow: -8px 0 30px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      animation: slideIn 0.25s ease;
      border-radius: 28px 0 0 28px;
      overflow-y: auto;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
      }
      to {
        transform: translateX(0);
      }
    }
    .profile-avatar {
      background: linear-gradient(135deg, #c084fc, #ec4899);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: white;
      margin-bottom: 20px;
    }
    .profile-field {
      margin: 12px 0;
    }
    .profile-field label {
      font-weight: 600;
      font-size: 12px;
      color: #64748b;
    }
    .profile-field input {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-bottom: 2px solid #e2e8f0;
      font-size: 16px;
      font-weight: 500;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .profile-field input:focus {
      border-bottom-color: #ec4899;
    }
    .save-profile-btn, .close-profile {
      background: #0f172a;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 700;
      margin-top: 24px;
      cursor: pointer;
    }
    .close-profile {
      background: #f1f5f9;
      color: #1e293b;
      margin-top: 12px;
    }
    .favorites-section {
      margin-top: 28px;
      border-top: 1px solid #f0f2f5;
      padding-top: 20px;
    }
    .fav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f2f5;
    }
    .fav-remove {
      color: #ec4899;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 8px;
    }

    .cart-bar {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border-top: 1px solid #edf2f7;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cart-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .cart-icon {
      position: relative;
    }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -10px;
      background: #ec4899;
      color: white;
      border-radius: 30px;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      min-width: 18px;
      text-align: center;
    }
    .cart-total {
      font-weight: 800;
      font-size: 20px;
    }
    .checkout-btn {
      background: #0f172a;
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .checkout-btn:active {
      transform: scale(0.96);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }
    .modal-content {
      background: white;
      max-width: 310px;
      width: 85%;
      border-radius: 48px;
      padding: 32px 24px;
      text-align: center;
    }
    .toast-msg {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 8px 20px;
      border-radius: 60px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .empty-favs {
      color: #94a3b8;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

    { id: 22, name: "Leather Crescent Bag", price: 2299, category: "accessories", size: "One Size", color: "Beige", img: "https://images.pexels.com/photos/1152077/pexels-photo-1152077.jpeg?auto=compress&cs=tinysrgb&w=400" },
    { id: 23, name: "Aviator Sunglasses", price: 890, category: "accessories", size: "One Size", color: "Black", img: "https://images.pexels.com/photos/1168119/pexels-photo-1168119.jpeg?auto=compress&cs=tinysrgb&w=400" },
    { id: 24, name: "Pearl Hair Claw", price: 390, category: "accessories", size: "One Size", color: "Beige", img: "https://images.pexels.com/photos/1656684/pexels-photo-1656684.jpeg?auto=compress&cs=tinysrgb&w=400" },
    { id: 25, name: "Chain Necklace Set", price: 599, category: "accessories", size: "One Size", color: "Gold", img: "https://images.pexels.com/photos/1204350/pexels-photo-1204350.jpeg?auto=compress&cs=tinysrgb&w=400" },
    { id: 26, name: "Silk Scarf", price: 749, category: "accessories", size: "One Size", color: "Red", img: "https://images.pexels.com/photos/1743244/pexels-photo-1743244.jpeg?auto=compress&cs=tinysrgb&w=400" },
    { id: 27, name: "Beanie Cap", price: 450, category: "accessories", size: "One Size", color: "Black", img: "https://images.pexels.com/photos/1940492/pexels-photo-1940492.jpeg?auto=compress&cs=tinysrgb&w=400" },
    { id: 28, name: "Leather Belt", price: 899, category: "accessories", size: "One Size", color: "Brown", img: "https://images.pexels.com/photos/1251176/pexels-photo-1251176.jpeg?auto=compress&cs=tinysrgb&w=400" }
  ];

  // STATE
  let cart = [];
  let favorites = new Set();
  let activeCategory = "all";
  let searchQuery = "";
  let selectedSize = "all";
  let selectedColor = "all";
  let userProfile = { name: "Fashion Lover", email: "hello@flowshop.com" };

  // DOM Elements
  const productGrid = document.getElementById("productGrid");
  const searchInput = document.getElementById("searchInput");
  const categoryItems = document.querySelectorAll(".cat-item");
  const sizeFilter = document.getElementById("sizeFilter");
  const colorFilter = document.getElementById("colorFilter");
  const cartCountSpan = document.getElementById("cartCount");
  const cartTotalSpan = document.getElementById("cartTotalPrice");
  const checkoutBtn = document.getElementById("checkoutBtn");
  const modal = document.getElementById("checkoutModal");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const toastMsg = document.getElementById("toastMsg");
  const profileOverlay = document.getElementById("profileOverlay");
  const profileIconBtn = document.getElementById("profileIconBtn");
  const profileHeartIcon = document.getElementById("profileHeartIcon");
  const closeProfileBtn = document.getElementById("closeProfileBtn");
  const closeProfileBtn2 = document.getElementById("closeProfileBtn2");
  const saveProfileBtn = document.getElementById("saveProfileBtn");
  const profileNameInput = document.getElementById("profileName");
  const profileEmailInput = document.getElementById("profileEmail");
  const favoritesListDiv = document.getElementById("favoritesList");
  const heartCountBadge = document.getElementById("heartCountBadge");
  const favCountPanel = document.getElementById("favCountPanel");

  let toastTimeout;
  function showToast(msg, isError = false) {
    toastMsg.innerText = msg;
    toastMsg.style.background = isError ? "#b91c1c" : "#1e293b";
    toastMsg.style.opacity = "1";
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => { toastMsg.style.opacity = "0"; }, 1400);
  }

  // HEART FUNCTIONALITY
  function toggleFavorite(productId) {
    if (favorites.has(productId)) {
      favorites.delete(productId);
      showToast(`💔 Removed from favorites`);
    } else {
      favorites.add(productId);
      showToast(`❤️ Added to favorites!`);
    }
    updateHeartIndicators();
    renderProducts();
    updateFavoritesPanel();
  }

  function updateHeartIndicators() {
    const favCount = favorites.size;
    heartCountBadge.innerText = favCount;
    if (favCountPanel) favCountPanel.innerText = favCount;
  }

  function updateFavoritesPanel() {
    const favProducts = Array.from(favorites).map(id => products.find(p => p.id === id)).filter(p => p);
    if (favProducts.length === 0) {
      favoritesListDiv.innerHTML = `<div class="empty-favs"><i class="far fa-heart"></i> No favorites yet<br>❤️ Tap heart on any product</div>`;
    } else {
      favoritesListDiv.innerHTML = favProducts.map(p => `
        <div class="fav-item">
          <span style="flex:1; font-size:13px; font-weight:500;">${p.name}<br><span style="font-size:11px; color:#ec4899;">₱${p.price}</span></span>
          <span class="fav-remove" data-id="${p.id}"><i class="fas fa-trash-alt"></i> remove</span>
        </div>
      `).join('');
      document.querySelectorAll('.fav-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const prodId = parseInt(btn.getAttribute('data-id'));
          if (favorites.has(prodId)) {
            favorites.delete(prodId);
            updateHeartIndicators();
            renderProducts();
            updateFavoritesPanel();
            showToast(`💔 Removed from favorites`);
          }
        });
      });
    }
    updateHeartIndicators();
  }

  function getFilteredProducts() {
    return products.filter(prod => {
      if (activeCategory !== "all" && prod.category !== activeCategory) return false;
      if (searchQuery && !prod.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
      if (selectedSize !== "all" && prod.size !== selectedSize) return false;
      if (selectedColor !== "all" && prod.color !== selectedColor) return false;
      return true;
    });
  }

  function renderProducts() {
    const filtered = getFilteredProducts();
    if (filtered.length === 0) {
      productGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:48px 20px;"><i class="fas fa-heart-broken" style="font-size:48px; opacity:0.4;"></i><p style="margin-top:12px;">No items match ✨</p></div>`;
      return;
    }
    productGrid.innerHTML = filtered.map(product => {
      const isLiked = favorites.has(product.id);
      return `
        <div class="product-card">
          <button class="heart-btn ${isLiked ? 'liked' : ''}" data-id="${product.id}">
            <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
          </button>
          <div class="product-img"><img src="${product.img}" alt="${product.name}" loading="lazy" onerror="this.src='https://placehold.co/400x500/f1f5f9/94a3b8?text=Image+Not+Found'"></div>
          <div class="product-info">
            <div class="product-title">${product.name}</div>
            <div class="product-price">₱${product.price.toLocaleString()}</div>
            <div class="product-meta"><span><i class="fas fa-tag"></i> ${product.size} / ${product.color}</span></div>
            <button class="btn-add" data-id="${product.id}"><i class="fas fa-plus-circle"></i> Add to cart</button>
          </div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.heart-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const prodId = parseInt(btn.getAttribute('data-id'));
        toggleFavorite(prodId);
      });
    });
    document.querySelectorAll('.btn-add').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const prodId = parseInt(btn.getAttribute('data-id'));
        const productToAdd = products.find(p => p.id === prodId);
        if (productToAdd) addToCart(productToAdd);
      });
    });
  }

  function addToCart(product) {
    const existing = cart.find(item => item.id === product.id);
    if (existing) {
      existing.quantity += 1;
      showToast(`🛍️ ${product.name} +1 (${existing.quantity})`);
    } else {
      cart.push({ id: product.id, product: product, quantity: 1 });
      showToast(`✨ ${product.name} added to cart`);
    }
    updateCartUI();
  }

  function updateCartUI() {
    const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
    const totalPrice = cart.reduce((sum, i) => sum + (i.product.price * i.quantity), 0);
    cartCountSpan.innerText = totalItems;
    cartTotalSpan.innerText = `₱${totalPrice.toLocaleString()}`;
  }

  function executeCheckout() {
    if (cart.length === 0) { showToast("⚠️ Cart empty", true); return; }
    const totalAmount = cart.reduce((sum, i) => sum + (i.product.price * i.quantity), 0);
    const itemCount = cart.reduce((sum, i) => sum + i.quantity, 0);
    document.getElementById("modalMessage").innerHTML = `🎉 Ordered <strong>${itemCount} items</strong> for <strong>₱${totalAmount.toLocaleString()}</strong>.<br>🌱 Supporting local sellers!`;
    modal.style.display = "flex";
    cart = [];
    updateCartUI();
    renderProducts();
  }

  function closeModalFunc() { modal.style.display = "none"; }
  function openProfilePanel() {
    profileNameInput.value = userProfile.name;
    profileEmailInput.value = userProfile.email;
    updateFavoritesPanel();
    profileOverlay.style.display = "flex";
  }
  function closeProfilePanel() { profileOverlay.style.display = "none"; }
  function saveProfile() {
    userProfile.name = profileNameInput.value.trim() || "Fashion Lover";
    userProfile.email = profileEmailInput.value.trim() || "hello@flowshop.com";
    showToast("✅ Profile saved!");
    closeProfilePanel();
  }

  function applyFiltersAndRender() {
    renderProducts();
    categoryItems.forEach(cat => {
      if (cat.getAttribute('data-cat') === activeCategory) cat.classList.add('active');
      else cat.classList.remove('active');
    });
    let filterCount = (selectedSize !== "all" ? 1 : 0) + (selectedColor !== "all" ? 1 : 0) + (activeCategory !== "all" ? 1 : 0) + (searchQuery ? 1 : 0);
    document.getElementById("filterBadge").innerText = filterCount ? `🎯 ${filterCount} active` : "⚡ live";
  }

  // Event Listeners
  searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; applyFiltersAndRender(); });
  categoryItems.forEach(cat => cat.addEventListener('click', () => { activeCategory = cat.getAttribute('data-cat'); applyFiltersAndRender(); }));
  sizeFilter.addEventListener('change', (e) => { selectedSize = e.target.value; applyFiltersAndRender(); });
  colorFilter.addEventListener('change', (e) => { selectedColor = e.target.value; applyFiltersAndRender(); });
  checkoutBtn.addEventListener('click', executeCheckout);
  closeModalBtn.addEventListener('click', closeModalFunc);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModalFunc(); });
  profileIconBtn.addEventListener('click', openProfilePanel);
  profileHeartIcon.addEventListener('click', openProfilePanel);
  closeProfileBtn.addEventListener('click', closeProfilePanel);
  closeProfileBtn2.addEventListener('click', closeProfilePanel);
  saveProfileBtn.addEventListener('click', saveProfile);
  document.getElementById("filterIcon").addEventListener("click", () => document.querySelector('.filter-group').scrollIntoView({ behavior: 'smooth' }));

  function init() {
    renderProducts();
    updateCartUI();
    updateFavoritesPanel();
  }
  init();
</script>
</body>
</html>
